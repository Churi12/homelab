---
name: Bootstrap Cluster and ArgoCD

on:
  push:
    branches:
      - main
      - copilot/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install k3d
        run: |
          curl -s \
            https://raw.githubusercontent.com/k3d-io/k3d/v5.6.0/install.sh \
            | bash

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.6

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Run bootstrap script
        run: |
          chmod +x bootstrap/bootstrap.sh
          CLEANUP_ON_EXIT=false bootstrap/bootstrap.sh

      - name: Verify ArgoCD installation
        run: |
          kubectl get deployment -n argocd
          kubectl get pods -n argocd

      - name: Check ArgoCD server
        run: |
          kubectl wait --for=condition=available \
            --timeout=60s \
            deployment/argocd-server \
            -n argocd

      - name: Verify Grafana is healthy
        run: |
          kubectl wait --for=condition=available \
            --timeout=60s \
            deployment/monitoring-grafana \
            -n monitoring
          kubectl get pods -n monitoring

      - name: Apply root app-of-apps and sync to current branch
        run: |
          TARGET_REVISION="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          echo "ArgoCD target revision: ${TARGET_REVISION}"
          kubectl apply -f apps/root.yaml
          kubectl patch application root -n argocd \
            --type=merge \
            -p "{\"spec\":{\"source\":{\"targetRevision\":\"${TARGET_REVISION}\"}}}"
          echo "Root Application applied and configured for branch: ${TARGET_REVISION}"

      - name: Wait for root Application to sync
        run: |
          echo "Waiting for root Application to sync..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get application root -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            echo "  Root sync status: ${STATUS} (attempt ${i}/60)"
            if [[ "${STATUS}" == "Synced" ]]; then
              echo "Root Application is Synced"
              break
            fi
            sleep 5
          done

      - name: Wait for demo-app Application to be discovered and patch its branch
        run: |
          TARGET_REVISION="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          echo "Waiting for demo-app Application to be created by root sync..."
          for i in $(seq 1 60); do
            if kubectl get application demo-app -n argocd &>/dev/null 2>&1; then
              echo "demo-app Application found after ${i} attempts"
              break
            fi
            echo "  Waiting... (attempt ${i}/60)"
            sleep 5
          done
          kubectl patch application demo-app -n argocd \
            --type=merge \
            -p "{\"spec\":{\"source\":{\"targetRevision\":\"${TARGET_REVISION}\"}}}"
          echo "demo-app Application patched for branch: ${TARGET_REVISION}"

      - name: Verify demo app pod is running and healthy
        run: |
          echo "Waiting for demo-app pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app=demo-app \
            -n demo \
            --timeout=300s
          echo "Demo app pod is running"
          kubectl get pods -n demo

      - name: Wait for loki Application to be discovered
        run: |
          echo "Waiting for loki Application to be created by root sync..."
          for i in $(seq 1 60); do
            if kubectl get application loki -n argocd &>/dev/null 2>&1; then
              echo "loki Application found after ${i} attempts"
              break
            fi
            echo "  Waiting... (attempt ${i}/60)"
            sleep 5
          done

      - name: Wait for alloy Application to be discovered
        run: |
          echo "Waiting for alloy Application to be created by root sync..."
          for i in $(seq 1 60); do
            if kubectl get application alloy -n argocd &>/dev/null 2>&1; then
              echo "alloy Application found after ${i} attempts"
              break
            fi
            echo "  Waiting... (attempt ${i}/60)"
            sleep 5
          done

      - name: Verify Loki and Alloy are healthy
        run: |
          echo "Waiting for Loki pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=loki \
            -n logging \
            --timeout=120s
          echo "Loki pod is ready"

          echo "Waiting for Alloy DaemonSet pods to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=alloy \
            -n logging \
            --timeout=120s
          echo "Alloy pods are ready"

          kubectl get pods -n logging

      - name: Show ArgoCD Application statuses
        run: |
          kubectl get application -n argocd

      - name: Cleanup
        if: always()
        run: |
          k3d cluster delete homelab || true
