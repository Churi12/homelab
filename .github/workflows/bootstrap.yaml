---
name: Bootstrap Cluster and ArgoCD

on:
  push:
    branches:
      - main
      - copilot/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install k3d
        run: |
          curl -s \
            https://raw.githubusercontent.com/k3d-io/k3d/v5.6.0/install.sh \
            | bash

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.6

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Run bootstrap script
        run: |
          chmod +x bootstrap/bootstrap.sh
          CLEANUP_ON_EXIT=false bootstrap/bootstrap.sh

      - name: Verify ArgoCD installation
        run: |
          kubectl get deployment -n argocd
          kubectl get pods -n argocd

      - name: Check ArgoCD server
        run: |
          kubectl wait --for=condition=available \
            --timeout=60s \
            deployment/argocd-server \
            -n argocd

      - name: Verify Grafana is healthy
        run: |
          kubectl wait --for=condition=available \
            --timeout=60s \
            deployment/monitoring-grafana \
            -n monitoring
          kubectl get pods -n monitoring

      - name: Verify ingress objects are created
        run: |
          echo "Checking ArgoCD ingress..."
          kubectl get ingress -n argocd
          kubectl get ingress argocd-server -n argocd \
            -o jsonpath='{.spec.rules[0].host}'
          echo ""
          echo "Checking Grafana ingress..."
          kubectl get ingress -n monitoring
          kubectl get ingress -n monitoring \
            -o jsonpath='{.items[0].spec.rules[0].host}'
          echo ""

      - name: Verify Traefik routes answer via nip.io hostnames
        run: |
          # Use --resolve to pin the nip.io hostname to 127.0.0.1 without
          # depending on external DNS during CI.
          echo "Waiting for ArgoCD to be reachable via Traefik..."
          for i in $(seq 1 24); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 5 \
              --resolve "argocd.127.0.0.1.nip.io:80:127.0.0.1" \
              http://argocd.127.0.0.1.nip.io/ 2>/dev/null || echo "000")
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "ArgoCD ingress OK (HTTP ${STATUS})"
              break
            fi
            if [[ ${i} -eq 24 ]]; then
              echo "ArgoCD ingress not reachable after 24 attempts (last status: ${STATUS})"
              kubectl describe ingress argocd-server -n argocd || true
              exit 1
            fi
            echo "  Attempt ${i}/24: HTTP ${STATUS}, retrying in 5s..."
            sleep 5
          done

          echo "Waiting for Grafana to be reachable via Traefik..."
          for i in $(seq 1 24); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 5 \
              --resolve "grafana.127.0.0.1.nip.io:80:127.0.0.1" \
              http://grafana.127.0.0.1.nip.io/ 2>/dev/null || echo "000")
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Grafana ingress OK (HTTP ${STATUS})"
              break
            fi
            if [[ ${i} -eq 24 ]]; then
              echo "Grafana ingress not reachable after 24 attempts (last status: ${STATUS})"
              kubectl describe ingress -n monitoring || true
              exit 1
            fi
            echo "  Attempt ${i}/24: HTTP ${STATUS}, retrying in 5s..."
            sleep 5
          done

      - name: Apply root app-of-apps and sync to current branch
        run: |
          TARGET_REVISION="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          echo "ArgoCD target revision: ${TARGET_REVISION}"
          kubectl apply -f apps/root.yaml
          kubectl patch application root -n argocd \
            --type=merge \
            -p "{\"spec\":{\"source\":{\"targetRevision\":\"${TARGET_REVISION}\"}}}"
          echo "Root Application applied and configured for branch: ${TARGET_REVISION}"

      - name: Wait for root Application to sync
        run: |
          echo "Waiting for root Application to sync..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get application root -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            echo "  Root sync status: ${STATUS} (attempt ${i}/60)"
            if [[ "${STATUS}" == "Synced" ]]; then
              echo "Root Application is Synced"
              break
            fi
            sleep 5
          done

      - name: Wait for demo-app Application to be discovered and patch its branch
        run: |
          TARGET_REVISION="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          echo "Waiting for demo-app Application to be created by root sync..."
          for i in $(seq 1 60); do
            if kubectl get application demo-app -n argocd &>/dev/null 2>&1; then
              echo "demo-app Application found after ${i} attempts"
              break
            fi
            echo "  Waiting... (attempt ${i}/60)"
            sleep 5
          done
          kubectl patch application demo-app -n argocd \
            --type=merge \
            -p "{\"spec\":{\"source\":{\"targetRevision\":\"${TARGET_REVISION}\"}}}"
          echo "demo-app Application patched for branch: ${TARGET_REVISION}"

      - name: Verify demo app pod is running and healthy
        run: |
          echo "Waiting for demo-app pod to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app=demo-app \
            -n demo \
            --timeout=300s
          echo "Demo app pod is running"
          kubectl get pods -n demo

      - name: Show ArgoCD Application statuses
        run: |
          kubectl get application -n argocd

      - name: Cleanup
        if: always()
        run: |
          k3d cluster delete homelab || true
