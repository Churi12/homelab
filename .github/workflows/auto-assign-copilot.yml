# Assigns the Copilot coding agent to an issue when it gets the "agent" label.
#
# Why label-gated and not every issue: not every issue should become code.
# Notes, questions and rough ideas should not spawn an agent session. Adding the
# "agent" label is the deliberate "yes, work on this one" signal.
#
# Note on model: this workflow only assigns Copilot to the issue. It cannot pick
# which model the agent uses. The model comes from your Copilot coding agent
# settings (set a free model there as the default if you want every run to be
# free). Verify on the billing page that runs show zero premium requests.
name: auto-assign-copilot

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    # Only run when the label that was just added is "agent".
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          set -euo pipefail

          # Find the Copilot bot actor id for this repo. It must be in the list
          # of actors that can be assigned, or assignment will silently no-op.
          BOT_ID=$(gh api graphql -f query='
            query($owner:String!, $name:String!) {
              repository(owner:$owner, name:$name) {
                suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:50) {
                  nodes { login __typename ... on Bot { id } }
                }
              }
            }' -f owner="${{ github.repository_owner }}" -f name="${{ github.event.repository.name }}" \
            --jq '.data.repository.suggestedActors.nodes[] | select(.login=="copilot-swe-agent") | .id')

          if [ -z "${BOT_ID}" ]; then
            echo "Copilot is not assignable on this repo. Is the Copilot coding agent enabled? Skipping."
            exit 0
          fi

          gh api graphql -f query='
            mutation($assignableId:ID!, $actorIds:[ID!]!) {
              replaceActorsForAssignable(input:{assignableId:$assignableId, actorIds:$actorIds}) {
                assignable { ... on Issue { number } }
              }
            }' -f assignableId="${ISSUE_NODE_ID}" -f actorIds="${BOT_ID}"

          echo "Assigned Copilot to the issue."
