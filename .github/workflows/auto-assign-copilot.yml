# Assigns the Copilot coding agent to an issue when it gets the "agent" label.
#
# Why label-gated and not every issue: not every issue should become code.
# Notes, questions and rough ideas should not spawn an agent session. Adding the
# "agent" label is the deliberate "yes, work on this one" signal.
#
# Note on model: this workflow only assigns Copilot to the issue. It cannot pick
# which model the agent uses. The model comes from your Copilot coding agent
# settings (set a free model there as the default if you want every run to be
# free). Verify on the billing page that runs show zero premium requests.
#
# Note on the token: this uses a personal access token from the secret
# COPILOT_ASSIGN_TOKEN, not the default GITHUB_TOKEN. The default token cannot
# see the Copilot agent in the list of assignable actors, so assignment silently
# skips. Create a PAT with repo scope and add it as a repo secret named
# COPILOT_ASSIGN_TOKEN (Settings > Secrets and variables > Actions).
name: auto-assign-copilot

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    # Only run when the label that was just added is "agent", and only for
    # issues opened by the repo owner. This is a public repo, so without the
    # owner check anyone who could label an issue could spawn an agent session.
    if: >-
      github.event.label.name == 'agent' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to the issue
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          set -euo pipefail

          # The default GITHUB_TOKEN cannot see the Copilot agent as an
          # assignable actor, so a personal access token is required here. Fail
          # loudly if the secret is missing, rather than skipping and looking
          # green.
          if [ -z "${GH_TOKEN}" ]; then
            echo "COPILOT_ASSIGN_TOKEN secret is not set. Add a PAT with repo scope as that secret."
            exit 1
          fi

          # Find the Copilot bot actor id for this repo. It must be in the list
          # of actors that can be assigned, or assignment will silently no-op.
          BOT_ID=$(gh api graphql -f query='
            query($owner:String!, $name:String!) {
              repository(owner:$owner, name:$name) {
                suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:50) {
                  nodes { login __typename ... on Bot { id } }
                }
              }
            }' -f owner="${{ github.repository_owner }}" -f name="${{ github.event.repository.name }}" \
            --jq '.data.repository.suggestedActors.nodes[] | select(.login=="copilot-swe-agent") | .id')

          if [ -z "${BOT_ID}" ]; then
            echo "Copilot is not assignable on this repo. Is the Copilot coding agent enabled, and does COPILOT_ASSIGN_TOKEN have repo scope?"
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg query 'mutation($assignableId:ID!, $actorIds:[ID!]!) { addAssigneesToAssignable(input:{assignableId:$assignableId, assigneeIds:$actorIds}) { assignable { ... on Issue { number } } } }' \
            --arg assignableId "${ISSUE_NODE_ID}" \
            --arg botId "${BOT_ID}" \
            '{query: $query, variables: {assignableId: $assignableId, actorIds: [$botId]}}')

          gh api graphql --input - <<< "${PAYLOAD}"

          echo "Assigned Copilot to the issue."
