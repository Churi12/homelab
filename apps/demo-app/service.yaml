---
# ClusterIP Service for the demo app.
# Reach it locally via: kubectl port-forward -n demo svc/demo-app 8888:80
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: 80
