---
# Tempo Application manifest.
# Deploys Grafana Tempo in single-binary mode via Helm for distributed tracing.
# Tempo provides the T (traces) in the LGTM observability stack.
# Uses local filesystem storage (no S3, no cloud) — fine for an ephemeral lab.
# Chart: grafana/tempo (single-binary, not tempo-distributed).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.7.2
    helm:
      values: |
        # Disable anonymous usage reporting.
        tempo:
          reportingEnabled: false
          storage:
            trace:
              # Local filesystem backend — no object store, no secrets.
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal
          # Enable OTLP receivers so instrumented apps can push traces.
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

        # No PVC — ephemeral lab, traces live only for the life of the pod.
        persistence:
          enabled: false

        # Keep resource usage low for the 2-node k3d lab.
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
